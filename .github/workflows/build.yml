name: Build and Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Regenerate dist with timestamp
        run: |
          for f in dist/*; do
            echo "// Built at: $(date -u +"%Y-%m-%dT%H:%M:%SZ") sha:${{ github.sha }}" | cat - "$f" > temp && mv temp "$f"
          done
      - name: Type check
        run: npm run typecheck
      - name: Get version
        id: version
        run: |
           node -e "
             const pkg = require('./package.json');
             const version = pkg.version.split('-')[0];
             console.log('VERSION=' + version);
             console.log('TAG_VERSION=v' + version);
           " >> $GITHUB_OUTPUT
      - name: Publish dist to CDN
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f dist/
          git commit -m "chore: release dist files for v${{ steps.version.outputs.VERSION }}"
          git push origin main --force
          git tag -f ${{ steps.version.outputs.TAG_VERSION }}
          git push origin ${{ steps.version.outputs.TAG_VERSION }} --force
      - name: Create distribution package
        run: |
          tar -czvf atom-engine.tar.gz dist/*
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: atom-engine.tar.gz
          generate_release_notes: true
          tag_name: ${{ steps.version.outputs.TAG_VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
