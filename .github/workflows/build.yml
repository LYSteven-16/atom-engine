name: Build and Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Type check
        run: npm run typecheck
      - name: Create tag
        run: |
          VERSION="v$(node -p 'require("./package.json").version')"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag $VERSION
          git push origin $VERSION
      - name: Publish dist to CDN
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mv dist dist-built
          git checkout main
          rm -rf dist
          mv dist-built dist
          git add -f dist/
          git commit -m "chore: release dist files for v$(node -p 'require(\"./package.json\").version')"
          git push origin main
          git tag -f "v$(node -p 'require(\"./package.json\").version')"
          git push origin "v$(node -p 'require(\"./package.json\").version')" --force
      - name: Create distribution package
        run: |
          tar -czvf atom-engine.tar.gz dist/*
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: atom-engine.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
