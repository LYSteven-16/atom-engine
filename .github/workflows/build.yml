name: Build and Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Type check
        run: npm run typecheck
      - name: Publish dist to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f dist/
          git commit -m "chore: release dist files"
          git push origin main --force
      - name: Get version
        id: version
        run: |
           node -e "
             const { execSync } = require('child_process');
             const now = new Date();
             const year = now.getFullYear().toString().slice(-2);
             const month = String(now.getMonth() + 1).padStart(2, '0');
             const day = String(now.getDate()).padStart(2, '0');
             const baseVersion = year + '.' + month + '.' + day;
             
             let buildNumber = 1;
             try {
               const tags = execSync('git tag --sort=-v:refname | grep ^v' + baseVersion + '- | head -1', { encoding: 'utf8' });
               if (tags.trim()) {
                 const parts = tags.trim().split('-');
                 if (parts.length > 1) {
                   buildNumber = parseInt(parts[1]) + 1;
                 }
               }
             } catch (e) {}
             
             const newVersion = baseVersion + '-' + String(buildNumber).padStart(2, '0');
             console.log('VERSION=' + newVersion);
             console.log('TAG_VERSION=v' + newVersion);
           " >> $GITHUB_OUTPUT
      - name: Create distribution package
        run: |
          tar -czvf atom-engine.tar.gz dist/*
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: atom-engine.tar.gz
          generate_release_notes: true
          tag_name: ${{ steps.version.outputs.TAG_VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
