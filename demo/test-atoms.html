<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>原子能力测试</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }
    h1 {
      text-align: center;
      color: #333;
    }
    .test-section {
      margin-bottom: 40px;
      padding: 20px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .test-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 15px;
      color: #333;
    }
    .test-container {
      min-height: 80px;
      border: 2px dashed #ddd;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 10px;
    }
    .test-label {
      font-size: 12px;
      color: #666;
      margin-bottom: 10px;
    }
    .result {
      font-size: 14px;
      color: #28a745;
      margin-top: 10px;
    }
    .error {
      color: #dc3545;
    }
  </style>
</head>
<body>
  <h1>🔬 原子能力测试</h1>
  
  <div id="test-results"></div>
  
  <script type="module">
    import { AtomEngine } from '../dist/index.mjs';
    
    const results = document.getElementById('test-results');
    
    function log(testName, success, message) {
      const div = document.createElement('div');
      div.className = 'test-section';
      div.innerHTML = `
        <div class="test-title">${testName}</div>
        <div class="test-container" id="container-${testName}"></div>
        <div class="${success ? 'result' : 'error'}">${message}</div>
      `;
      results.appendChild(div);
      return div.querySelector('.test-container');
    }
    
    function testText() {
      const container = log('Text 原子', true, '创建成功');
      const engine = new AtomEngine();
      engine.mount(container);
      
      try {
        engine.render({
          id: 'test-text',
          position: { x: 10, y: 10 },
          atoms: [
            { capability: 'text', position: { x: 10, y: 10 }, text: 'Hello World!', size: 24, color: [51, 51, 51] }
          ]
        });
        return true;
      } catch (e) {
        log('Text 原子', false, '错误: ' + e.message);
        return false;
      }
    }
    
    function testBackground() {
      const container = log('Background 原子', true, '创建成功');
      const engine = new AtomEngine();
      engine.mount(container);
      
      try {
        engine.render({
          id: 'test-bg',
          position: { x: 10, y: 10 },
          atoms: [
            { capability: 'background', color: [255, 200, 200] }
          ]
        });
        return true;
      } catch (e) {
        log('Background 原子', false, '错误: ' + e.message);
        return false;
      }
    }
    
    function testBorder() {
      const container = log('Border 原子', true, '创建成功');
      const engine = new AtomEngine();
      engine.mount(container);
      
      try {
        engine.render({
          id: 'test-border',
          position: { x: 10, y: 10 },
          atoms: [
            { capability: 'border', width: 2, color: [0, 122, 255], radius: 8 }
          ]
        });
        return true;
      } catch (e) {
        log('Border 原子', false, '错误: ' + e.message);
        return false;
      }
    }
    
    function testShadow() {
      const container = log('Shadow 原子', true, '创建成功');
      const engine = new AtomEngine();
      engine.mount(container);
      
      try {
        engine.render({
          id: 'test-shadow',
          position: { x: 10, y: 10 },
          atoms: [
            { capability: 'shadow', x: 0, y: 4, blur: 8, color: [0, 0, 0] }
          ]
        });
        return true;
      } catch (e) {
        log('Shadow 原子', false, '错误: ' + e.message);
        return false;
      }
    }
    
    function testScale() {
      const container = log('Scale 原子 (hover触发)', true, '创建成功 - 尝试hover');
      const engine = new AtomEngine();
      engine.mount(container);
      
      try {
        engine.render({
          id: 'test-scale',
          position: { x: 10, y: 10 },
          atoms: [
            { capability: 'background', color: [200, 220, 255] },
            { capability: 'border', width: 1, color: [0, 122, 255], radius: 8 },
            { capability: 'scale', value: 1.1, trigger: 'hover' }
          ]
        });
        return true;
      } catch (e) {
        log('Scale 原子', false, '错误: ' + e.message);
        return false;
      }
    }
    
    function testOpacity() {
      const container = log('Opacity 原子 (hover触发)', true, '创建成功 - 尝试hover');
      const engine = new AtomEngine();
      engine.mount(container);
      
      try {
        engine.render({
          id: 'test-opacity',
          position: { x: 10, y: 10 },
          atoms: [
            { capability: 'background', color: [255, 200, 200] },
            { capability: 'opacity', value: 0.5, trigger: 'hover' }
          ]
        });
        return true;
      } catch (e) {
        log('Opacity 原子', false, '错误: ' + e.message);
        return false;
      }
    }
    
    function testTextWithDecoration() {
      const container = log('Text + Background + Border (组合)', true, '创建成功');
      const engine = new AtomEngine();
      engine.mount(container);
      
      try {
        engine.render({
          id: 'test-combo',
          position: { x: 10, y: 10 },
          atoms: [
            { capability: 'text', position: { x: 15, y: 25 }, text: '🎉 组合测试', size: 20, color: [51, 51, 51] },
            { capability: 'background', color: [255, 255, 255] },
            { capability: 'border', width: 2, color: [0, 122, 255], radius: 12 }
          ]
        });
        return true;
      } catch (e) {
        log('Text + Background + Border', false, '错误: ' + e.message);
        return false;
      }
    }
    
    function testCollapse() {
      const container = log('Collapse 原子 (click触发)', true, '创建成功 - 点击切换');
      const engine = new AtomEngine();
      engine.mount(container);
      
      try {
        engine.render({
          id: 'test-collapse',
          position: { x: 10, y: 10 },
          atoms: [
            { capability: 'text', position: { x: 15, y: 20 }, text: '点击展开/收起', size: 14, color: [51, 51, 51] },
            { capability: 'background', color: [245, 245, 245] },
            { capability: 'border', width: 1, color: [200, 200, 200], radius: 8 },
            { capability: 'collapse', group: 'test-group', expandedValue: 80, collapsedValue: 50 }
          ]
        });
        return true;
      } catch (e) {
        log('Collapse 原子', false, '错误: ' + e.message);
        return false;
      }
    }
    
    function testClick() {
      const container = log('Click 原子', true, '创建成功 - 点击测试');
      const engine = new AtomEngine();
      engine.mount(container);
      
      try {
        engine.render({
          id: 'test-click',
          position: { x: 10, y: 10 },
          atoms: [
            { capability: 'text', position: { x: 15, y: 20 }, text: '👆 点击我', size: 14, color: [51, 51, 51] },
            { capability: 'background', color: [200, 255, 200] },
            { capability: 'border', width: 1, color: [0, 180, 0], radius: 8 },
            { capability: 'click' }
          ]
        });
        return true;
      } catch (e) {
        log('Click 原子', false, '错误: ' + e.message);
        return false;
      }
    }
    
    function testMultipleAtoms() {
      const container = log('多原子卡片测试', true, '创建成功');
      const engine = new AtomEngine();
      engine.mount(container);
      
      try {
        engine.render({
          id: 'test-card',
          position: { x: 10, y: 10 },
          atoms: [
            { capability: 'text', position: { x: 15, y: 15 }, text: '📱', size: 32, color: [51, 51, 51] },
            { capability: 'text', position: { x: 15, y: 55 }, text: '功能标题', size: 16, color: [51, 51, 51] },
            { capability: 'text', position: { x: 15, y: 78 }, text: '功能描述文字', size: 12, color: [128, 128, 128] },
            { capability: 'background', color: [255, 255, 255] },
            { capability: 'border', width: 1, color: [229, 229, 229], radius: 12 },
            { capability: 'shadow', x: 0, y: 2, blur: 4, color: [0, 0, 0] },
            { capability: 'scale', value: 1.05, trigger: 'hover' }
          ]
        });
        return true;
      } catch (e) {
        log('多原子卡片测试', false, '错误: ' + e.message);
        return false;
      }
    }
    
    const allTests = [
      testText,
      testBackground,
      testBorder,
      testShadow,
      testScale,
      testOpacity,
      testTextWithDecoration,
      testCollapse,
      testClick,
      testMultipleAtoms
    ];
    
    allTests.forEach(test => test());
    
  </script>
</body>
</html>
