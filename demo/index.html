<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AtomEngine Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      color: white;
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 48px;
      font-weight: 700;
      margin-bottom: 12px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }

    .header p {
      font-size: 18px;
      opacity: 0.9;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 24px;
      margin-bottom: 40px;
    }

    .card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
    }

    .card-header {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
      padding: 16px 20px;
      font-weight: 600;
      font-size: 16px;
    }

    .card-header.green { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
    .card-header.blue { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
    .card-header.orange { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
    .card-header.purple { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); color: #333; }
    .card-header.cyan { background: linear-gradient(135deg, #00c6fb 0%, #005bea 100%); }
    .card-header.pink { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); color: #333; }

    .card-body {
      padding: 20px;
    }

    .workplace {
      min-height: 120px;
      position: relative;
      background: #fafafa;
      border-radius: 8px;
      overflow: visible;
    }

    .footer {
      text-align: center;
      color: white;
      opacity: 0.8;
      margin-top: 40px;
    }

    .footer a {
      color: white;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>AtomEngine</h1>
      <p>基于层级分解的纯 JavaScript 组件渲染引擎</p>
    </div>

    <div class="grid">
      <div class="card">
        <div class="card-header purple">表单组件</div>
        <div class="card-body">
          <div class="workplace" id="workplace-1"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-header green">Choice 原子 - 垂直排列</div>
        <div class="card-body">
          <div class="workplace" id="workplace-2"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-header blue">Choice 原子 - 水平排列</div>
        <div class="card-body">
          <div class="workplace" id="workplace-3"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-header orange">交互与动画</div>
        <div class="card-body">
          <div class="workplace" id="workplace-4"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-header cyan">文本展示</div>
        <div class="card-body">
          <div class="workplace" id="workplace-5"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-header pink">Flex 布局</div>
        <div class="card-body">
          <div class="workplace" id="workplace-6"></div>
        </div>
      </div>
    </div>

    <div class="footer">
      <p>查看源码：<a href="https://github.com/LYSteven-16/atom-engine" target="_blank">GitHub</a></p>
    </div>
  </div>

  <script type="module">
    import { BeakerManager } from '../dist/BeakerManager.mjs';

    const manager1 = new BeakerManager([
      {
        id: 'form-demo',
        position: { x: 0, y: 0 },
        width: 360,
        height: 100,
        atoms: [
          {
            id: 'form-bg',
            capability: 'background',
            color: [255, 255, 255],
            opacity: 1
          },
          {
            id: 'form-border',
            capability: 'border',
            borderWidth: 1,
            color: [220, 220, 220],
            radius: 8
          },
          {
            id: 'input-name',
            capability: 'input',
            position: { x: 10, y: 10 },
            width: 160,
            height: 36,
            placeholder: '姓名',
            onChange: (value) => console.log('姓名:', value)
          },
          {
            id: 'input-email',
            capability: 'input',
            position: { x: 180, y: 10 },
            width: 160,
            height: 36,
            placeholder: '邮箱'

          {
            id: 'select-role',
            capability: 'select',
            position: { x: 10, y: 54 },
            width: 160,
            height: 36,
            placeholder: '选择角色',
            options: [
              { label: '开发者', value: 'dev' },
              { label: '设计师', value: 'designer' },
              { label: '产品经理', value: 'pm' }
            ]
          },
          {
            id: 'checkbox-agree',
            capability: 'checkbox',
            position: { x: 180, y: 58 },
            label: '同意协议',
            checked: false,
            onChange: (checked) => console.log('协议同意:', checked)
          }
        ]
      }
    ], document.getElementById('workplace-1'));

    const manager2 = new BeakerManager([
      {
        id: 'choice-vertical-demo',
        position: { x: 0, y: 0 },
        width: 360,
        height: 180,
        atoms: [
          {
            id: 'cv-bg',
            capability: 'background',
            color: [255, 255, 255],
            opacity: 1
          },
          {
            id: 'cv-question',
            capability: 'text',
            position: { x: 10, y: 10 },
            text: '以下哪个是 JavaScript 的数据类型？',
            size: 14,
            color: [40, 40, 40]
          },
          {
            id: 'cv-choice',
            capability: 'choice',
            position: { x: 10, y: 40 },
            optionCount: 4,
            layout: 'vertical',
            size: 14,
            width: 160,
            height: 32,
            options: [
              { label: 'A. String', value: 'A', isCorrect: false },
              { label: 'B. Number', value: 'B', isCorrect: false },
              { label: 'C. Both A and B', value: 'C', isCorrect: true },
              { label: 'D. None', value: 'D', isCorrect: false }
            ],
            onSelect: (value, isCorrect) => {
              console.log('选择:', value, isCorrect ? '✓ 正确' : '✗ 错误');
            }
          }
        ]
      }
    ], document.getElementById('workplace-2'));

    const manager3 = new BeakerManager([

        id: 'choice-horizontal-demo',

            id: 'ch-bg',

            opacity: 1

            id: 'ch-question',

            color: [40, 40, 40]
          },

            id: 'ch-choice',
            capability: 'choice',

            height: 36,

              { label: 'A. slowly', value: 'A', isCorrect: true },
              { label: 'B. quietly', value: 'B', isCorrect: false },
              { label: 'C. fast', value: 'C', isCorrect: false },
              { label: 'D. carefully', value: 'D', isCorrect: false }

            onSelect: (value, isCorrect) => {
              console.log('选择:', value, isCorrect ? '✓ 正确' : '✗ 错误');

            color: [255, 255, 255],
            align: 'center'

          {
            id: 'int-hover',
            capability: 'hover',
            targetId: 'int-hover-box',

          {

          {

          },
          {
            id: 'int-scale-text',
            capability: 'text',
            position: { x: 210, y: 38 },
            text: '缩放动画',

            color: [255, 255, 255],
            align: 'center'
          },
          {
            id: 'int-scale',
            capability: 'scale',
            targetId: 'int-scale-box',
            from: 1,
            to: 1.1,
            duration: 300,
            loop: true,
            alternate: true
          }
        ]
      }
    ], document.getElementById('workplace-4'));

    const manager5 = new BeakerManager([
      {
        id: 'text-layout-demo',
        position: { x: 0, y: 0 },
        width: 360,
        height: 100,
        atoms: [
          {
            id: 'tl-bg',
            capability: 'background',
            color: [255, 255, 255],
            opacity: 1
          },
          {
            id: 'tl-title',
            capability: 'text',

          },
          {

            capability: 'text',

          },
          {
            id: 'tl-tag-1',
            capability: 'background',
            position: { x: 10, y: 65 },

            height: 24,
            color: [65, 105, 225],
            opacity: 1
          },
          {
            id: 'tl-tag-1-text',
            capability: 'text',
            position: { x: 10, y: 70 },
            text: 'React',
            size: 11,
            color: [255, 255, 255],
            align: 'center',
            maxWidth: 60
          },
          {
            id: 'tl-tag-2',
            capability: 'background',
            position: { x: 78, y: 65 },

          },
          {

            capability: 'text',

            text: 'Vue',
            size: 11,
            color: [255, 255, 255],
            align: 'center',
            maxWidth: 60
          },
          {
            id: 'tl-tag-3',
            capability: 'background',
            position: { x: 146, y: 65 },
            width: 70,
            height: 24,
            color: [220, 53, 69],
            opacity: 1
          },
          {
            id: 'tl-tag-3-text',
            capability: 'text',
            position: { x: 146, y: 70 },
            text: 'Angular',
            size: 11,

            align: 'center',
            maxWidth: 70
          },
          {

            capability: 'background',
            position: { x: 224, y: 65 },
            width: 60,
            height: 24,
            color: [255, 99, 71],
            opacity: 1
          },
          {
            id: 'tl-tag-4-text',
            capability: 'text',
            position: { x: 224, y: 70 },
            text: 'Svelte',
            size: 11,
            color: [255, 255, 255],
            align: 'center',
            maxWidth: 60
          }
        ]
      }
    ], document.getElementById('workplace-5'));

    const manager6 = new BeakerManager([
      {
        id: 'flex-demo',
        position: { x: 0, y: 0 },
        width: 360,
        height: 80,
        atoms: [
          {
            id: 'flex-bg',
            capability: 'background',
            color: [255, 255, 255],
            opacity: 1
          },
          {
            id: 'flex-item-1',
            capability: 'background',
            position: { x: 20, y: 20 },
            width: 70,
            height: 40,
            color: [255, 99, 71],
            opacity: 1
          },
          {
            id: 'flex-item-1-border',
            capability: 'border',
            position: { x: 20, y: 20 },
            borderWidth: 2,
            color: [255, 99, 71],
            radius: 6
          },
          {
            id: 'flex-item-1-text',

            position: { x: 20, y: 32 },

          },
          {

          {

          {
            id: 'flex-item-4-text',

          }

      }
    ], document.getElementById('workplace-6'));

    console.log('AtomEngine Demo 已加载');
  </script>
</body>
</html>
