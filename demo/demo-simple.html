<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AtomEngine - 简单复合展示</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { position: relative; margin: 0; padding: 20px; background: rgb(240, 240, 245); min-height: 100vh; }
  </style>
</head>
<body>
  <script type="module">
    import { SubstanceManager } from '../dist/SubstanceManager.mjs';

    new SubstanceManager([

      // 简单复合示例 - 2-3个原子组合

        id: 'simple-course-card',
        position: { x: 0, y: 0 },
        width: 280,
        height: 140,
        atoms: [
          { capability: 'background', color: [255, 255, 255] },
          { capability: 'border', width: 1, color: [220, 220, 220], radius: 12 },

          { capability: 'hover' },
          { capability: 'shadow', x: 2, y: 2, blur: 8, color: [0, 0, 0, 0.08] }

          { capability: 'hover' },
          { capability: 'shadow', x: 3, y: 3, blur: 10, color: [0, 0, 0, 0.12] }

          { capability: 'click', keepOnRelease: false },
          { capability: 'shadow', x: 3, y: 3, blur: 10, color: [80, 200, 120, 0.3] }
        ]
      },

      // 10. 删除按钮 - background + text + click
      // 使用原子: background, border, text, shadow, scale, opacity, click
      // 预期效果: 点击时有反馈效果
      {
        id: 'simple-delete-btn',
        position: { x: 990, y: 160 },
        width: 180,
        height: 60,
        atoms: [
          { capability: 'background', color: [255, 90, 90] },
          { capability: 'border', width: 2, color: [230, 70, 70], radius: 8 },
          { capability: 'text', position: { x: 50, y: 35 }, text: '🗑️ 删除', size: 16, color: [255, 255, 255] },
          { capability: 'scale', value: 1.1, trigger: 'click' },
          { capability: 'opacity', value: 0.6, trigger: 'click' },
          { capability: 'click', keepOnRelease: false },
          { capability: 'shadow', x: 3, y: 3, blur: 10, color: [255, 90, 90, 0.3] }

      },

      // 11. 侧边导航项 - background + text + hover
      // 使用原子: background, text, hover, scale, opacity
      // 预期效果: 悬停时背景变亮
      {
        id: 'simple-nav-item',
        position: { x: 0, y: 310 },
        width: 200,
        height: 50,
        atoms: [
          { capability: 'background', color: [250, 250, 255] },
          { capability: 'text', position: { x: 60, y: 30 }, text: '📁 首页', size: 14, color: [60, 60, 80] },
          { capability: 'background', color: [220, 230, 255], trigger: 'hover', width: 200, height: 50, radius: 0 },
          { capability: 'hover' }
        ]
      },

      // 12. 图片卡片 - image + text + background
      // 使用原子: background, border, image, text, shadow, hover, scale
      // 预期效果: 悬停放大图片
      {
        id: 'simple-image-card',
        position: { x: 220, y: 310 },
        width: 220,
        height: 160,
        atoms: [
          { capability: 'background', color: [255, 255, 255] },
          { capability: 'border', width: 1, color: [220, 220, 220], radius: 10 },
          { capability: 'image', position: { x: 10, y: 10 }, src: 'https://via.placeholder.com/200x80/87ceeb/ffffff?text=Nature', width: 200, height: 80, alt: '风景图' },
          { capability: 'text', position: { x: 15, y: 105 }, text: '🌄 美丽的自然风光', size: 14, color: [60, 60, 60] },

          { capability: 'hover' },
          { capability: 'shadow', x: 3, y: 3, blur: 10, color: [0, 0, 0, 0.1] }

      // 13. 代码展示块 - code + background
      // 使用原子: background, border, code, text, shadow
      // 预期效果: 显示代码块
      {
        id: 'simple-code-block',
        position: { x: 460, y: 310 },
        width: 280,
        height: 100,
        atoms: [
          { capability: 'background', color: [40, 44, 52] },
          { capability: 'border', width: 1, color: [60, 64, 72], radius: 8 },
          { capability: 'text', position: { x: 15, y: 20 }, text: 'JavaScript', size: 12, color: [150, 150, 150] },
          { capability: 'code', position: { x: 15, y: 40 }, code: 'function hello() {\n  return "Hello!";\n}', language: 'javascript' },
          { capability: 'shadow', x: 3, y: 3, blur: 10, color: [0, 0, 0, 0.2] }

      },

      // 14. 标签组件 - background + text
      // 使用原子: background, text, border, shadow, hover, scale
      // 预期效果: 悬停轻微放大
      {
        id: 'simple-tags',
        position: { x: 760, y: 310 },
        width: 400,
        height: 50,
        atoms: [
          { capability: 'text', position: { x: 10, y: 30 }, text: '标签:', size: 12, color: [100, 100, 100] },
          { capability: 'background', color: [255, 100, 100], radius: 15, width: 70, height: 30, position: { x: 60, y: 10 } },
          { capability: 'text', position: { x: 72, y: 30 }, text: '前端', size: 11, color: [255, 255, 255] },

    console.log('🎯 AtomEngine - 简单复合展示已加载');
    console.log('共计 14 个简单复合示例');
  </script>
</body>
