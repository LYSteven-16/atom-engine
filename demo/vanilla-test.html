<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vanilla JS 测试</title>
</head>
<body>
  <div style="padding: 20px;">
    <h1>Vanilla JS 渲染测试</h1>
    <div id="target" style="border: 2px solid red; width: 400px; height: 300px; background: white;"></div>
    <div id="result" style="margin-top: 20px; padding: 10px; background: #f5f5f5; font-family: monospace;"></div>
  </div>
  
  <script type="module">
    import { AtomEngine } from '../dist/index.mjs';
    
    const target = document.getElementById('target');
    const result = document.getElementById('result');
    
    function log(msg) {
      result.textContent += msg + '\n';
      console.log(msg);
    }
    
    try {
      log('1. Creating engine...');
      const engine = new AtomEngine(target);
      
      log('2. Rendering molecule...');
      const beaker = engine.render({
        id: 'card1',
        position: { x: 10, y: 10 },
        atoms: [
          { capability: 'background', color: [100, 150, 200] },
          { capability: 'text', position: { x: 20, y: 20 }, text: 'Test Card', size: 20, color: [255, 255, 255] },
          { capability: 'border', color: [50, 100, 150], width: 2, radius: 10 }
        ]
      });
      
      log('3. Checking DOM...');
      log('   target.children.length: ' + target.children.length);
      
      if (target.children[0]) {
        const el = target.children[0];
        log('4. Element details:');
        log('   tagName: ' + el.tagName);
        log('   id: ' + el.id);
        log('   background: ' + el.style.backgroundColor);
        log('   border: ' + el.style.border);
        log('   width: ' + el.style.width);
        log('   height: ' + el.style.height);
        log('   children.length: ' + el.children.length);
        
        if (el.children[0]) {
          log('5. First child:');
          log('   tagName: ' + el.children[0].tagName);
          log('   textContent: ' + el.children[0].textContent);
          log('   style: ' + el.children[0].style.cssText.substring(0, 200));
        }
      }
      
      log('6. Success!');
    } catch (e) {
      log('Error: ' + e.message);
      log('Stack: ' + e.stack);
    }
  </script>
</body>
</html>
