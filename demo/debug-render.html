<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>渲染调试</title>
</head>
<body style="padding: 20px; font-family: monospace;">
  <h1>渲染调试</h1>
  
  <div id="app" style="border: 2px solid red; width: 800px; height: 600px; position: relative; background: white;"></div>
  
  <div id="log" style="margin-top: 20px; padding: 10px; background: #1e1e1e; color: #0f0; font-size: 12px; max-height: 400px; overflow: auto; white-space: pre-wrap;"></div>
  
  <script type="module">
    const log = document.getElementById('log');
    const app = document.getElementById('app');
    
    function debug(msg) {
      log.textContent += msg + '\n';
      console.log('[Engine]', msg);
    }
    
    debug('开始测试...');
    
    import('../dist/index.mjs')
      .then(({ AtomEngine }) => {
        debug('模块加载成功');
        
        const engine = new AtomEngine(app);
        debug('引擎创建成功');
        
        const beaker = engine.render({
          id: 'test1',
          position: { x: 50, y: 50 },
          atoms: [
            { capability: 'background', color: [66, 133, 244] },
            { capability: 'text', position: { x: 10, y: 10 }, text: 'Hello!', size: 24, color: [255, 255, 255] }
          ]
        });
        
        debug('渲染完成');
        debug('app.children.length: ' + app.children.length);
        
        if (app.children.length > 0) {
          const el = app.children[0];
          debug('容器元素:');
          debug('  - id: ' + el.id);
          debug('  - backgroundColor: ' + el.style.backgroundColor);
          debug('  - children: ' + el.children.length);
          
          if (el.children.length > 0) {
            debug('文字元素:');
            debug('  - textContent: ' + el.children[0].textContent);
          }
        }
      })
      .catch(err => {
        debug('错误: ' + err.message);
        debug(err.stack);
      });
  </script>
</body>
</html>
