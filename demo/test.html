<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>引擎测试</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .test { margin: 20px 0; padding: 20px; border: 1px solid #ccc; min-height: 100px; }
  </style>
</head>
<body>
  <h1>AtomEngine 测试</h1>
  
  <div id="container1" class="test">
    <h2>测试1：简单文本</h2>
  </div>
  
  <div id="container2" class="test">
    <h2>测试2：卡片（hover效果）</h2>
  </div>

  <div id="container3" class="test">
    <h2>测试3：多个原子组合</h2>
  </div>

  <script type="module">
    import { AtomEngine } from '../dist/index.mjs';
    
    console.log('1. 创建引擎实例1');
    const engine1 = new AtomEngine();
    
    console.log('2. 挂载引擎1到 container1');
    engine1.mount('#container1');
    
    console.log('3. 渲染简单文本分子');
    const textMolecule = {
      id: 'simple-text',
      position: { x: 0, y: 50 },
      atoms: [
        { capability: 'text', position: { x: 0, y: 0 }, text: '这是一个简单的文本原子', size: 16, color: [0, 0, 0] }
      ]
    };
    engine1.render(textMolecule);
    
    console.log('4. 创建引擎实例2');
    const engine2 = new AtomEngine();
    
    console.log('5. 挂载引擎2到 container2');
    engine2.mount('#container2');
    
    console.log('6. 渲染带样式的卡片');
    const cardMolecule = {
      id: 'card',
      position: { x: 0, y: 50 },
      atoms: [
        { capability: 'text', position: { x: 20, y: 20 }, text: 'Hover Me!', size: 18, color: [51, 51, 51] },
        { capability: 'background', color: [255, 200, 200] },
        { capability: 'border', width: 2, color: [255, 100, 100], radius: 8 },
        { capability: 'scale', value: 1.1, trigger: 'hover' }
      ]
    };
    engine2.render(cardMolecule);
    
    console.log('7. 创建引擎实例3');
    const engine3 = new AtomEngine();
    
    console.log('8. 挂载引擎3到 container3');
    engine3.mount('#container3');
    
    console.log('9. 渲染多原子分子');
    const complexMolecule = {
      id: 'complex',
      position: { x: 0, y: 50 },
      atoms: [
        { capability: 'text', position: { x: 20, y: 20 }, text: '📦', size: 24, color: [51, 51, 51] },
        { capability: 'text', position: { x: 80, y: 15 }, text: '标题文本', size: 18, color: [0, 0, 0] },
        { capability: 'text', position: { x: 80, y: 45 }, text: '这是描述内容', size: 14, color: [128, 128, 128] },
        { capability: 'background', color: [245, 245, 245] },
        { capability: 'border', width: 1, color: [200, 200, 200], radius: 8 }
      ]
    };
    engine3.render(complexMolecule);
    
    console.log('测试完成！');
  </script>
</body>
</html>
