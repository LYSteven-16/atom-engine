<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AtomEngine CDN 测试</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f0f0f0;
    }
    #container {
      width: 800px;
      height: 600px;
      background: white;
      border: 1px solid #ddd;
      position: relative;
    }
  </style>
</head>
<body>
  <h1>AtomEngine CDN 导入测试</h1>
  <p>使用 jsDelivr 从 GitHub 直接导入</p>
  
  <div id="container"></div>
  
  <script src="https://cdn.jsdelivr.net/gh/LYSteven-16/atom-engine@main/dist/BeakerManager.global.js"></script>
  <script>
    console.log('AtomEngine loaded:', typeof AtomEngine);
    console.log('AtomEngine.BeakerManager:', AtomEngine ? AtomEngine.BeakerManager : 'undefined');
    
    if (AtomEngine && AtomEngine.BeakerManager) {
      const manager = new AtomEngine.BeakerManager();
      
      const molecule = {
        id: 'test-component',
        position: { x: 50, y: 50 },
        width: 300,
        height: 200,
        atoms: [
          {
            capability: 'background',
            id: 'bg-1',
            color: [66, 133, 244],
            opacity: 1
          },
          {
            capability: 'text',
            id: 'text-1',
            content: 'Hello from CDN!',
            fontSize: 20,
            color: [255, 255, 255]
          },
          {
            capability: 'border',
            id: 'border-1',
            borderWidth: 2,
            color: [33, 66, 133]
          }
        ]
      };
      
      manager.createBeaker('container', molecule);
      console.log('Beaker created successfully!');
    } else {
      console.error('Failed to load AtomEngine');
    }
  </script>
</body>
</html>
